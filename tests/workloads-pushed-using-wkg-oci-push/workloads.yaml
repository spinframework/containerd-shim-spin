apiVersion: apps/v1
kind: Deployment
metadata:
  name: wasm-spin-wkg
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wasm-spin-wkg
  template:
    metadata:
      labels:
        app: wasm-spin-wkg
    spec:
      runtimeClassName: wasmtime-spin
      containers:
        - name: testwasm
          image: ttl.sh/containerd-shim-tests/wkg-oci-push/spin-hello-world:latest
          imagePullPolicy: IfNotPresent
          command: ["/"]
          resources: # limit the resources to 128Mi of memory and 100m of CPU
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: wasm-spin-wkg
spec:
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  selector:
    app: wasm-spin-wkg
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wasm-ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /spin(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: wasm-spin-wkg
                port:
                  number: 80