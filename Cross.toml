[build]
default-target = "x86_64-unknown-linux-musl"

# Base images: Docker Hub mirrors of `ghcr.io/cross-rs/*:0.2.5` for environments where GHCR
# returns `denied` without `docker login ghcr.io`. Swap `image` to `ghcr.io/cross-rs/...:0.2.5`
# after logging in if you prefer the official registry.

[target.x86_64-unknown-linux-musl]
image = "togettoyou/ghcr.io.cross-rs.x86_64-unknown-linux-musl:0.2.5"
dockerfile = { file = "./cross/Dockerfile", build-args = { CROSS_CMAKE_SYSTEM_PROCESSOR = "x86_64", CROSS_SYSROOT = "/usr/local/x86_64-linux-musl" } }

[target.aarch64-unknown-linux-musl]
image = "togettoyou/ghcr.io.cross-rs.aarch64-unknown-linux-musl:0.2.5"
dockerfile = { file = "./cross/Dockerfile", build-args = { CROSS_CMAKE_SYSTEM_PROCESSOR = "aarch64", CROSS_SYSROOT = "/usr/local/aarch64-linux-musl" } }
